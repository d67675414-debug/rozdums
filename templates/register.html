<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — ROZDUM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
    <div class="bg-glow"></div>

    <main class="auth-standalone">
        <section class="auth-standalone-hero card">
            <div class="hero-chip">Создание аккаунта • аватарка • русский интерфейс</div>
            <h1>ROZDUM</h1>
            <p>Логин только на английском, ник на русском, аватарка и быстрый старт.</p>
        </section>

        <section class="auth-card card">
            <h2>Регистрация</h2>
            <p class="muted">Логин: только английские буквы, цифры и _</p>

            <form method="POST" enctype="multipart/form-data">
                <div class="field">
                    <label>Логин</label>
                    <input type="text" name="username" placeholder="Например: dima_01" required>
                </div>

                <div class="field">
                    <label>Ник</label>
                    <input type="text" name="nickname" placeholder="Например: Дима" required>
                </div>

                <div class="field">
                    <label>Пароль</label>
                    <input type="password" name="password" placeholder="Придумай пароль" required>
                </div>

                <div class="field">
                    <label class="file-label">Выбери аватарку</label>
                    <input type="file" name="avatar" accept="image/*">
                </div>

                <button class="btn-primary" type="submit">Зарегистрироваться</button>
            </form>

            <a class="cta-link" href="{{ url_for('login') }}">Уже есть аккаунт</a>
        </section>
    </main>
</body>
</html>
